<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Terminal</title>
<style>
body{background:#0c120f;color:#b9f2a1}
pre{white-space:pre-wrap}
input,button{font-family:inherit}
.ctr{max-width:900px;margin:24px auto;padding:16px;background:#111;border:1px solid #2b2b2b}
label{display:block;margin:8px 0}
</style>
</head>
<body>
<div class="ctr">
  <h1 style="margin:0 0 8px;color:#58ff87">B.A.R.D Console</h1>
  <p>Clearance required</p>
  <form id="auth">
    <label>Username <input id="u"></label>
    <label>Password <input id="p" type="password"> title="Enter youre Username" ><br> </label>
    <button>Enter</button>
  </form>
  <pre id="out" style="min-height:320px"></pre>
</div>

<script>
const lines=[
   "> Welcome User! ",
  "> boot bard_console",
  "> boot B.A.R.D_subsystem",
  "> BOOTING ....",
   "> INSTALLING ....",
   "> INSTALLING ....",
   "> CONNECTING TO B.A.R.D SERVER ....",
   "> RESTARTING ....",
  "> initialising subsystems ... OK",
  "> linking Interchange robotics facility ... OK",
  "> Windscale core telemetry ... PARTIAL",
  "> Oberon signal ... DETECTED",
   "> BOOTING ....",
  "> decrypting research logs ... OK",
  "> bunker lattice ping: L1–L15 ONLINE",
  "> robotics registry: SENTRIES ACTIVE",
  "> contamination index: OSCILLATING",
  "> compiling hazard map ... OK",
  "> opening classified dossiers ... READY",
  "> session elevated: ADMINISTRATOR",
   ">   -----WELCOME USER -----   ",
  "> --- ROBOTICS SUMMARY ---",
  "> Class B Unit 45 : ACTIVE  WARNING UNIDENTIFED USER DETECTED",
   "> Class B Unit 45 : ACTIVE ACTIVATING DEFENCE MESURES",
  "> Orange/White/Black sentries : ACTIVE",
  "> Flamethrower variant : DEPOLYED  (ERROR) 5 NOT RESPONDING RESET CONNECTION",
  "> HMG variant : DEPLOYED",
  "> UNIDENTIFIED USER",
  "> WRONG IP DETECTED",
  "> SHUTTING DOWN",
  "> --- END ---"
];
function runOut(target, arr, delay=35){
  let i=0; target.textContent='';
  (function tick(){ if(i<arr.length){ target.textContent += arr[i++]+"\n"; setTimeout(tick, delay);} })();
}
const form=document.getElementById('auth');
form.addEventListener('submit',ev=>{
  ev.preventDefault();
  const u=document.getElementById('u').value.trim();
  const p=document.getElementById('p').value;
  const out=document.getElementById('out');
  if(u==='Admin' && p==='Areyouadmin?'){
    runOut(out, lines, 25);
  }else{
    runOut(out, ["> access denied", "> incorrect credentials"], 40);
  }
});
</script>

<!-- ---------- Firebase presence (unique device, site-wide) ---------- -->
<script type="module">
  // This script keeps your device counted across ALL pages and tabs (1 per device/browser profile).
  const firebaseConfig = {
    apiKey: "AIzaSyDSkdC2shGSGv58Sqv8rchkomNxS525RRU",
    authDomain: "b-a-r-d.firebaseapp.com",
    databaseURL: "https://b-a-r-d-default-rtdb.firebaseio.com",
    projectId: "b-a-r-d",
    appId: "1:998685683728:web:6b3789b12049e903fcda95"
  };

  // If the Active Users UI exists on this page, we’ll update it; otherwise we just log.
  const countEl = document.getElementById('activeUsersCount');
  const barEl   = document.getElementById('activeUsersBar');
  const pctEl   = document.getElementById('activeUsersPct');

  const configured =
    !!firebaseConfig.apiKey &&
    !!firebaseConfig.projectId &&
    !!firebaseConfig.databaseURL &&
    (firebaseConfig.databaseURL.includes("firebaseio.com") || firebaseConfig.databaseURL.includes("firebasedatabase.app"));

  function updateActiveDevices(n){
    const pct = Math.max(0, Math.min(100, n)); // simple 1 device = 1%
    if (countEl) countEl.textContent = String(n);
    if (barEl)   barEl.style.width = pct + '%';
    if (pctEl)   pctEl.textContent = pct + '%';
    // Also dispatch a site-wide event any page can listen to
    window.dispatchEvent(new CustomEvent('bard:activeDevices', { detail: { count: n, pct } }));
  }
  updateActiveDevices(0);

  (async () => {
    console.log("[B.A.R.D] Presence starting. Path:", location.pathname);
    if (!configured) {
      console.warn("[B.A.R.D] Active users disabled (missing/invalid config).");
      return;
    }
    try {
      const [{ initializeApp },
             { getDatabase, ref, onValue, set, onDisconnect, serverTimestamp },
             { getAuth, signInAnonymously, onAuthStateChanged }] = await Promise.all([
        import('https://www.gstatic.com/firebasejs/10.12.3/firebase-app.js'),
        import('https://www.gstatic.com/firebasejs/10.12.3/firebase-database.js'),
        import('https://www.gstatic.com/firebasejs/10.12.3/firebase-auth.js')
      ]);

      const app  = initializeApp(firebaseConfig);
      const db   = getDatabase(app);
      const auth = getAuth(app);

      await signInAnonymously(auth);
      console.log("[B.A.R.D] Signed in anonymously.");

      onAuthStateChanged(auth, async (user) => {
        if (!user) return;

        const uid = user.uid;
        const sessionId = Math.random().toString(36).slice(2,10);
        const myPath = `presence/${uid}/${sessionId}`;
        const myRef  = ref(db, myPath);

        const writePresence = async () => {
          await set(myRef, { ts: serverTimestamp(), page: location.pathname });
        };

        await writePresence();
        console.log("[B.A.R.D] Wrote presence at", myPath);

        onDisconnect(myRef).remove();
        console.log("[B.A.R.D] onDisconnect registered for", myPath);

        setInterval(writePresence, 20000); // heartbeat 20s

        // === Count unique devices (1 per UID), SITE-WIDE (SCOPE_PATH = null) ===
        const presenceRoot = ref(db, 'presence');
        onValue(presenceRoot, (snap) => {
          const now = Date.now();
          const RECENT_MS = 45000;
          const SCOPE_PATH = null; // site-wide: do not filter by page

          let totalDevices = 0;

          snap.forEach(uidNode => {
            let userActive = false;
            uidNode.forEach(sessNode => {
              const v = sessNode.val();
              if (!v) return;

              const ts = typeof v.ts === 'number' ? v.ts : 0;
              const fresh = ts && (now - ts <= RECENT_MS);
              const pageOK = !SCOPE_PATH || v.page === SCOPE_PATH;

              if (fresh && pageOK) userActive = true;
            });
            if (userActive) totalDevices += 1;
          });

          console.log("[B.A.R.D] Active devices:", totalDevices);
          updateActiveDevices(totalDevices);
        });
      });
    } catch (err) {
      console.error("[B.A.R.D] Active users setup failed:", err);
    }
  })();
</script>

</body>
</html>
