<script type="module">
  const firebaseConfig = {
    apiKey: "AIzaSyDyyq8nfIXJE_xPsFQqeySZlBXUcIKMio",
    authDomain: "b-a-r-d-5e93c.firebaseapp.com",
    databaseURL: "https://b-a-r-d-5e93c-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "b-a-r-d-5e93c",
    storageBucket: "b-a-r-d-5e93c.firebasestorage.app",
    messagingSenderId: "424994363683",
    appId: "1:424994363683:web:05b03bddea1a88b942816"
  };

  const countEl = document.getElementById('activeUsersCount');
  const barEl   = document.getElementById('activeUsersBar');
  const pctEl   = document.getElementById('activeUsersPct');

  function updateActiveUsers(n){
    const pct = Math.max(0, Math.min(100, n)); 
    countEl.textContent = String(n);
    barEl.style.width = pct + '%';
    pctEl.textContent = pct + '%';
  }
  updateActiveUsers(0);

  const configured = firebaseConfig.apiKey && !firebaseConfig.apiKey.startsWith("YOUR_");

  if (!configured) {
    console.warn("[B.A.R.D] Active users disabled: missing Firebase config");
  } else {
    try {
      const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.12.3/firebase-app.js');
      const { getDatabase, ref, onValue, set, onDisconnect, serverTimestamp } =
        await import('https://www.gstatic.com/firebasejs/10.12.3/firebase-database.js');
      const { getAuth, signInAnonymously, onAuthStateChanged } =
        await import('https://www.gstatic.com/firebasejs/10.12.3/firebase-auth.js');

      const app  = initializeApp(firebaseConfig);
      const db   = getDatabase(app);
      const auth = getAuth(app);

      await signInAnonymously(auth).catch(console.error);

      onAuthStateChanged(auth, async (user)=>{
        if(!user) return;
        const uid = user.uid;
        const sessionId = Math.random().toString(36).slice(2,10);
        const myRef = ref(db, `presence/${uid}/${sessionId}`);

        await set(myRef, { ts: serverTimestamp(), page: location.pathname });
        onDisconnect(myRef).remove();

        addEventListener('pagehide', ()=> navigator.sendBeacon?.(
          firebaseConfig.databaseURL + '/presence/' + encodeURIComponent(uid) + '/' + sessionId + '.json',
          JSON.stringify(null)
        ));

        const presenceRoot = ref(db, 'presence');
        onValue(presenceRoot, (snap)=>{
          let total = 0;
          snap.forEach(userNode=>{
            total += userNode.numChildren();
          });
          updateActiveUsers(total);
        });
      });
    } catch (e) {
      console.error("[B.A.R.D] Presence failed:", e);
    }
  }
</script>
